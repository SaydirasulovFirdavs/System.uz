services:
  - type: web
    name: saydx-system
    env: node
    plan: free
    region: frankfurt # Optional: frankfurt is good for CIS
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: saydx-db
          property: connectionString

databases:
  - name: saydx-db
    databaseName: saydx
    user: saydx_user
    plan: free
    region: frankfurt
